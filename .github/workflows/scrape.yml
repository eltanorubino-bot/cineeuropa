name: Actualizar noticias CINEEUROPA

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 16 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install feedparser requests beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commitear cambios
        run: |
          git config user.name "CINEEUROPA Bot"
          git config user.email "bot@cineeuropa.github.io"
          git add data.json
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "Actualizacion automatica"
            git push
          fi
